<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juliana Rose | Profile</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #0a0a0a;
            --accent: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
            --card-width: 480px; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        /* 1. BLURRED PAGE BACKGROUND */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: url('assets/dp.jpg') center/cover no-repeat;
            filter: blur(60px) brightness(0.4);
            transform: scale(1.2); /* Prevents white edges from blur */
        }

        /* STICKY HERO CARD */
        .sticky-card-container {
            position: fixed;
            top: 20px;
            width: 100%;
            max-width: var(--card-width);
            height: 75vh;
            z-index: 1;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            will-change: opacity;
        }

        .profile-hero {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
        }

        .sticky-card-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(10,10,10,0.8), transparent);
        }

        /* MAIN CONTENT */
        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: var(--card-width);
            margin-top: 68vh; 
            background: rgba(10, 10, 10, 0.85); /* Semi-transparent to see blurred bg */
            backdrop-filter: blur(20px);
            padding: 40px 15px;
            border-radius: 40px 40px 0 0;
            min-height: 120vh;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .profile-header { text-align: center; margin-bottom: 25px; }
        .name { font-family: 'Caveat', cursive; font-size: 3.8rem; font-weight: 700; margin-bottom: -10px; background: linear-gradient(45deg, #fff, #ffccd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .handle { color: #aaa; letter-spacing: 2px; font-size: 0.8rem; }

        /* 2. COLOURED SOCIAL ICONS */
        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; display: grid; place-items: center; text-decoration: none; transition: 0.3s; font-size: 1.4rem; color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        .social-btn.instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .social-btn.facebook { background: #1877F2; }
        .social-btn.snapchat { background: #FFFC00; color: #000; } /* Snapchat is yellow/black */
        
        .social-btn:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* TAB SYSTEM */
        .gallery-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #777;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 15px;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active { color: white; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }

        /* 3. GALLERY GRIDS WITH TITLES */
        .gallery-section { display: none; }
        .gallery-section.active { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .media-item {
            aspect-ratio: 1/1;
            background: #151515;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .media-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        
        /* Media Title Overlay */
        .media-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 10px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            text-align: center;
        }

        .media-item:hover img { transform: scale(1.1); }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: white;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .lightbox.active { display: flex; }
        .lightbox-content { max-width: 100%; max-height: 80vh; border-radius: 10px; }
        .close-lightbox { position: absolute; top: 30px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; }

        @media (max-width: 500px) {
            :root { --card-width: 100%; }
            .sticky-card-container { top: 0; border-radius: 0; height: 80vh; }
            .main-content { margin-top: 72vh; border-radius: 35px 35px 0 0; }
        }
    </style>
</head>
<body>

    <!-- 1. Blurred Background Layer -->
    <div class="page-background"></div>

    <div class="sticky-card-container" id="card">
        <img src="assets/dp.jpg" class="profile-hero" alt="Hero">
    </div>

    <main class="main-content">
        <div class="profile-header">
            <h1 class="name">Juliana Rose</h1>
            <p class="handle">@juliana_rose._</p>
        </div>

        <!-- 2. Coloured Social Bar -->
        <div class="social-bar">
            <a href="https://www.instagram.com/juliana_rose._/" class="social-btn instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/imbabyjuliana/" class="social-btn facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://www.snapchat.com/@imbabyjuliana" class="social-btn snapchat"><i class="fab fa-snapchat-ghost"></i></a>
        </div>

        <div class="gallery-tabs">
            <button class="tab-btn active" data-target="photo-gallery">Photos</button>
            <button class="tab-btn" data-target="video-gallery">Videos</button>
        </div>

        <!-- 3. PHOTO SECTION WITH TITLES -->
        <div id="photo-gallery" class="gallery-section active">
            <div class="media-item" data-type="image" data-full="assets/photo 1.jpg">
                <img src="assets/photo 1.jpg">
                <div class="media-info">Good morning 💖</div>
            </div>
            <div class="media-item" data-type="image" data-full="assets/photo 2.jpg">
                <img src="assets/photo 2.jpg">
                <div class="media-info">Do you like it? 🥰</div>
            </div>
            <div class="media-item" data-type="image" data-full="assets/photo 3.jpg">
                <img src="assets/photo 3.jpg">
                <div class="media-info">Beautiful sunny mornings🥰</div>
            </div>
            <div class="media-item" data-type="image" data-full="assets/photo 4.jpg">
                <img src="assets/photo 4.jpg">
                <div class="media-info">My legs look pretty good in these nylon tights 🎀</div>
            </div>
        </div>

        <!-- 3. VIDEO SECTION WITH TITLES -->
        <div id="video-gallery" class="gallery-section">
            <div class="media-item" data-type="video" data-full="assets/video 1.mp4">
                <img src="assets/video 1 thumbnail.png">
                <div class="play-overlay"><i class="fas fa-play"></i></div>
                <div class="media-info">This could be us. 🤫</div>
            </div>
            <div class="media-item" data-type="video" data-full="assets/video 2.mp4">
                <img src="assets/video 2 thumbnail.png">
                <div class="play-overlay"><i class="fas fa-play"></i></div>
                <div class="media-info">Your Girlfriend In A Cute Robe Wants To Have Fun With You'👅</div>
            </div>
        </div>

        <div style="height: 100px;"></div>
    </main>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" id="closeLightbox">&times;</span>
        <div id="lightbox-container"></div>
    </div>

    <script>
        // Scroll opacity effect
        const card = document.getElementById('card');
        window.addEventListener('scroll', () => {
            const opacity = 1 - (window.scrollY / 500);
            card.style.opacity = opacity < 0 ? 0 : opacity;
        });

        // Tab switching
        const tabs = document.querySelectorAll('.tab-btn');
        const sections = document.querySelectorAll('.gallery-section');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
            });
        });

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxContainer = document.getElementById('lightbox-container');
        const mediaItems = document.querySelectorAll('.media-item');

        mediaItems.forEach(item => {
            item.addEventListener('click', () => {
                const type = item.dataset.type;
                const source = item.dataset.full;
                lightboxContainer.innerHTML = '';
                if (type === 'image') {
                    const img = document.createElement('img');
                    img.src = source;
                    img.className = 'lightbox-content';
                    lightboxContainer.appendChild(img);
                } else {
                    const video = document.createElement('video');
                    video.src = source;
                    video.className = 'lightbox-content';
                    video.controls = true;
                    video.autoplay = true;
                    lightboxContainer.appendChild(video);
                }
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        const close = () => {
            lightbox.classList.remove('active');
            lightboxContainer.innerHTML = '';
            document.body.style.overflow = 'auto';
        };
        document.getElementById('closeLightbox').addEventListener('click', close);
        lightbox.addEventListener('click', (e) => { if(e.target === lightbox) close(); });
    </script>
</body>
</html>
